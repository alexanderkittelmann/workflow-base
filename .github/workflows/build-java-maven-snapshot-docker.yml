name: Build snapshot reusable workflow

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
      docker_image_name:
        required: true
        type: string
      maven_internal-apis_repo_url:
        required: true
        type: string
      sonar_project_key:
        required: true
        type: string
      runs-on:
        required: false
        type: string
        default: '["ubuntu-latest"]'
      # Optional: push the snapshot image to a plain-HTTP registry reachable from
      # the runner (a self-hosted Nexus) INSTEAD of ghcr.io. Leave it unset and
      # this workflow behaves exactly as before -- the input is additive, so
      # existing callers are unaffected.
      #
      # Expects `<host>:<port>`, no scheme and no trailing slash, e.g.
      # `192.168.188.192:32000`. The image is pushed as
      # `<docker_registry>/<docker_image_name>` -- WITHOUT the ghcr `<owner>/`
      # segment, since a self-hosted registry has no owner namespace.
      #
      # Requires the runner to expose the registry password in its environment as
      # NEXUS_RUNNER_PASSWORD (see the auth step for why that is an environment
      # value rather than a secret input).
      docker_registry:
        required: false
        type: string
        default: ''
      docker_registry_user:
        required: false
        type: string
        default: 'hotstox-runner'
    secrets:
      ACCESS_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true
jobs:
  build-java-maven-snapshot:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    steps:
      - uses: actions/checkout@v7

      # Fail fast: the SonarQube scan runs only after `mvn clean package
      # verify` (~3 min), so an expired/missing SONAR_TOKEN otherwise burns
      # the whole build before surfacing. Validate the token up front -- the
      # scan itself still runs late because it needs the build/coverage
      # output. Same dependabot carve-out as the scan + cache steps (those
      # runs don't receive repository secrets).
      - name: Validate Sonar token (fail fast)
        if: github.actor != 'dependabot[bot]'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          [ -n "$SONAR_TOKEN" ] || { echo "::error::SONAR_TOKEN secret is empty"; exit 1; }
          resp=$(curl -sS -u "$SONAR_TOKEN:" https://sonarcloud.io/api/authentication/validate)
          echo "$resp" | grep -q '"valid":true' \
            || { echo "::error::SONAR_TOKEN invalid or expired: $resp"; exit 1; }
          echo "Sonar token OK"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          check-latest: true
          # `cache: maven` restores ~/.m2/repository before any subsequent step,
          # keyed on the pom.xml hash. Replaces the previous manual
          # actions/cache step that lived at the bottom of the job and so
          # never actually restored the cache before `mvn` ran.
          cache: maven

      # Sonar's scanner CLI downloads a private JRE + plugins (~100 MB) into
      # ~/.sonar/cache on first run. Restore that BEFORE the SonarQube scan
      # step so the JRE comes from cache instead of the network. (The
      # previous workflow had this step at the very end of the job, so the
      # save worked but the restore never fired in time.)
      - name: Cache SonarQube packages
        if: github.actor != 'dependabot[bot]'
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: maven-settings
        uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [{
                "id": "github",
                "username": "${{ github.repository_owner }}",
                "password": "${{ secrets.ACCESS_TOKEN }}"
            },
            {
                "id": "github2",
                "username": "${{ github.repository_owner }}",
                "password": "${{ secrets.ACCESS_TOKEN }}"
            }]
          repositories: '[{"id":"github2","name":"github2","url":"${{ inputs.maven_internal-apis_repo_url }}","snapshots":{"enabled":true}}]'
          githubServer: false

      # Pin Maven to the repo's committed wrapper (./mvnw) when present, so the
      # build runs the version-controlled Maven (e.g. 3.9.10) instead of the
      # runner's ambient `mvn`. Self-hosted runners install Maven via
      # `apt-get install maven`, which can resolve an ancient surefire (2.17)
      # that silently discovers ZERO JUnit 5 tests -> empty JaCoCo -> 0% Sonar
      # coverage while the build still goes green. The wrapper makes Maven
      # identical on GitHub-hosted and self-hosted runners. Repos without a
      # wrapper fall back to ambient `mvn`.
      - name: Resolve Maven (prefer the committed wrapper)
        run: |
          if [ -f ./mvnw ]; then
            chmod +x ./mvnw
            echo "MVN=./mvnw" >> "$GITHUB_ENV"
          else
            echo "MVN=mvn" >> "$GITHUB_ENV"
          fi

      - name: Build and test
        run: $MVN clean package verify

      # Dependabot PRs don't get secrets, so SonarQube would fail.
      # We skip the scan for Dependabot-authored runs but still run the rest.
      - name: SonarQube scan
        if: github.actor != 'dependabot[bot]'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: $MVN org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=${{ inputs.sonar_project_key }}

      - name: Get the version
        id: tag
        run: echo "VERSION=$(echo $GITHUB_REF | cut -d / -f 3)" >> $GITHUB_ENV

      # Multi-arch Docker buildx (linux/arm64 + linux/amd64) is the most
      # expensive stage on this workflow. PR pushes don't need a published
      # image -- the maven build + tests above cover correctness. Skip the
      # Docker steps unless we're publishing from main, to save Actions
      # minutes (mirrors hotstox-frontend build-test.yml).
      # Optional self-hosted-registry auth (infra#338 Phase B). No-op unless the
      # caller passes `docker_registry`, so existing callers are unaffected.
      #
      # The credential is written straight into a job-scoped DOCKER_CONFIG rather
      # than via `docker login`: the CLI's login round-trips the DAEMON, which
      # refuses a plain-HTTP registry unless it is in daemon.json
      # insecure-registries. buildkit does the push itself and only reads the
      # credential file, so this needs no host-level change. A job-scoped config
      # also keeps the credential out of a shared runner's ~/.docker/config.json.
      #
      # ORDER MATTERS: DOCKER_CONFIG must be exported BEFORE setup-buildx-action,
      # because buildx stores builder state under $DOCKER_CONFIG/buildx. Setting
      # it afterwards makes the build step (and the action's own cleanup
      # post-step) fail with `ERROR: no builder "..." found`.
      - name: Configure self-hosted registry auth
        id: registry-auth
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          REGISTRY: ${{ inputs.docker_registry }}
          REGISTRY_USER: ${{ inputs.docker_registry_user }}
        run: |
          set -euo pipefail
          # Emit an (empty) buildkitd config either way, so the buildx step below
          # can reference the output unconditionally.
          {
            echo "buildkitd_config<<__EOF__"
          } > "${RUNNER_TEMP}/bk.txt"
          if [ -z "${REGISTRY}" ]; then
            echo "__EOF__" >> "${RUNNER_TEMP}/bk.txt"
            cat "${RUNNER_TEMP}/bk.txt" >> "$GITHUB_OUTPUT"
            echo "No docker_registry input — pushing to ghcr.io as before."
            exit 0
          fi
          # NEXUS_RUNNER_PASSWORD comes from the self-hosted runner's on-node
          # service environment, not `secrets.*` -- the registry is node-local, so
          # a repository secret would be unusable from a GitHub-hosted runner
          # anyway. That also means GitHub does not auto-mask it.
          if [ -z "${NEXUS_RUNNER_PASSWORD:-}" ]; then
            echo "::error::docker_registry='${REGISTRY}' was requested but NEXUS_RUNNER_PASSWORD is not set on this runner."
            exit 1
          fi
          echo "::add-mask::${NEXUS_RUNNER_PASSWORD}"
          auth=$(printf '%s:%s' "${REGISTRY_USER}" "${NEXUS_RUNNER_PASSWORD}" | base64 -w0)
          echo "::add-mask::${auth}"
          cfg="${RUNNER_TEMP}/docker-config"
          mkdir -p "$cfg"
          printf '{"auths":{"%s":{"auth":"%s"}}}' "${REGISTRY}" "${auth}" > "${cfg}/config.json"
          chmod 600 "${cfg}/config.json"
          echo "DOCKER_CONFIG=${cfg}" >> "$GITHUB_ENV"
          # buildkit does not read the docker daemon's insecure-registries; a
          # plain-HTTP registry must be declared in buildkit's own config or the
          # push fails the TLS handshake.
          {
            printf '[registry."%s"]\n' "${REGISTRY}"
            printf '  http = true\n'
            echo "__EOF__"
          } >> "${RUNNER_TEMP}/bk.txt"
          cat "${RUNNER_TEMP}/bk.txt" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Self-cleaning: creates a multi-arch-capable builder AND removes it in
        # its post-step, so the self-hosted runner doesn't accumulate orphaned
        # `docker buildx create --use` builders (infra#180 / workflow-base#10).
        uses: docker/setup-buildx-action@v4
        with:
          # Empty (and therefore inert) unless the caller opted in via
          # `docker_registry` -- see the auth step above.
          buildkitd-config-inline: ${{ steps.registry-auth.outputs.buildkitd_config }}

      # Pushes two tags: the mutable branch tag (`:main`) for anything that still
      # floats, plus an immutable `:sha-<7>` tag. GitOps CD (infra#161) pins dev's
      # overlay to the `:sha-<7>` — a floating `:main` never changes the manifest
      # `image:` string, so the reconciler would never detect a new image. Same
      # sha tag format as hotstox-frontend's build-test.yml.
      - name: Build Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ./
        env:
          GITHUB_ACTOR: ${{ secrets.GIT_PACKAGES_USER }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GIT_PACKAGE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          ACTUAL_TAG: ${{ env.VERSION }}
          REGISTRY: ${{ inputs.docker_registry }}
        run: |
          if [ -n "${REGISTRY}" ]; then
            # Self-hosted registry (infra#338 Phase B). No `docker login` -- the
            # credential was already written into the job-scoped DOCKER_CONFIG,
            # and login would round-trip the daemon, which refuses plain HTTP.
            # No `<owner>/` segment: a self-hosted registry has no owner namespace.
            image="${REGISTRY}/${{ inputs.docker_image_name }}"
          else
            docker login ghcr.io/$GITHUB_ACTOR -u=$GITHUB_ACTOR -p=$GIT_PACKAGE_PASSWORD
            image="ghcr.io/$GITHUB_OWNER/${{ inputs.docker_image_name }}"
          fi
          sha_tag="sha-${GITHUB_SHA::7}"
          docker buildx build --platform linux/arm64,linux/amd64 \
            -t "${image}:${ACTUAL_TAG}" \
            -t "${image}:${sha_tag}" \
            --push .
          echo "Published ${image}:${ACTUAL_TAG} and ${image}:${sha_tag}" >> "${GITHUB_STEP_SUMMARY}"
