name: Build snapshot reusable workflow

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
      docker_image_name:
        required: true
        type: string
      maven_internal-apis_repo_url:
        required: true
        type: string
      sonar_project_key:
        required: true
        type: string
    secrets:
      ACCESS_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true
jobs:
  build-java-maven-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          check-latest: true
          cache: maven

      - name: maven-settings
        uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [{
                "id": "github",
                "username": "${{ github.repository_owner }}",
                "password": "${{ secrets.ACCESS_TOKEN }}"
            },
            {
                "id": "github2",
                "username": "${{ github.repository_owner }}",
                "password": "${{ secrets.ACCESS_TOKEN }}"
            }]
          repositories: '[{"id":"github2","name":"github2","url":"${{ inputs.maven_internal-apis_repo_url }}","snapshots":{"enabled":true}}]'
          githubServer: false

      - name: Build and test
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn clean package verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=${{ inputs.sonar_project_key }}

      - name: Get the version
        id: tag
        run: echo "VERSION=$(echo $GITHUB_REF | cut -d / -f 3)" >> $GITHUB_ENV

      # Multi-arch Docker buildx (linux/arm64 + linux/amd64) is the most
      # expensive stage on this workflow. PR pushes don't need a published
      # image -- the maven build + tests above cover correctness. Skip the
      # Docker steps unless we're publishing from main, to save Actions
      # minutes (mirrors hotstox-frontend build-test.yml).
      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker buildx create --use

      - name: Build Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ./
        env:
          GITHUB_ACTOR: ${{ secrets.GIT_PACKAGES_USER }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GIT_PACKAGE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          ACTUAL_TAG: ${{ env.VERSION }}
        run: |
          docker login ghcr.io/$GITHUB_ACTOR -u=$GITHUB_ACTOR -p=$GIT_PACKAGE_PASSWORD
          docker buildx build --platform linux/arm64,linux/amd64 -t ghcr.io/$GITHUB_OWNER/${{ inputs.docker_image_name }}:$ACTUAL_TAG --push .

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
