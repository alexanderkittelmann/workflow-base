name: Release main reusable workflow

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      docker_image_name:
        required: true
        type: string
      maven_internal-apis_repo_url:
        required: true
        type: string
      runs-on:
        description: 'Runner labels as a JSON array string (mirrors the snapshot workflow). Default keeps GitHub-hosted; pass e.g. ''["self-hosted", "build"]'' to run on a self-hosted runner.'
        required: false
        type: string
        default: '["ubuntu-latest"]'
      docker_platforms:
        description: 'Buildx target platforms. Default is multi-arch; pass ''linux/amd64'' for an amd64-only build (avoids QEMU on an amd64 self-hosted runner).'
        required: false
        type: string
        default: 'linux/arm64,linux/amd64'
    secrets:
      ACCESS_TOKEN:
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build-java-maven-release:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: maven-settings
        uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [{
                "id": "github",
                "username": "${{ github.repository_owner }}",
                "password": "${{ secrets.ACCESS_TOKEN }}"
            },
            {
                "id": "github2",
                "username": "${{ github.repository_owner }}",
                "password": "${{ secrets.ACCESS_TOKEN }}"
            }]
          repositories: '[{"id":"github2","name":"github2","url":"${{ inputs.maven_internal-apis_repo_url }}","snapshots":{"enabled":true}}]'
          githubServer: false

      - name: Configure git
        run: |
          git config --global committer.email "noreply@github.com"
          git config --global committer.name "GitHub"
          git config --global author.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global author.name "${GITHUB_ACTOR}"

      - name: Checkout main branch
        run: git checkout main

      - name: Prepare release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn --batch-mode release:prepare -DreleaseVersion=${{ inputs.release_tag }} -Dusername=$GITHUB_ACTOR -Dpassword=$GITHUB_TOKEN

      - name: get-pom-version
        id: pom-version
        run: echo "version=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        # Self-cleaning: creates a multi-arch-capable builder AND removes it in
        # its post-step, so the self-hosted runner doesn't accumulate orphaned
        # `docker buildx create --use` builders (infra#180 / workflow-base#10).
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        working-directory: ./
        env:
          GITHUB_ACTOR: ${{ secrets.GIT_PACKAGES_USER }}
          GIT_PACKAGE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REGISTRY: ${{ env.REGISTRY }}
          ACTUAL_TAG: ${{ inputs.release_tag }}
        run: |
          docker login ghcr.io/$GITHUB_ACTOR -u=$GITHUB_ACTOR -p=$GIT_PACKAGE_PASSWORD
          docker buildx build --platform ${{ inputs.docker_platforms }} -t ghcr.io/$GITHUB_ACTOR/${{ inputs.docker_image_name }}:$ACTUAL_TAG -t ghcr.io/$GITHUB_ACTOR/${{ inputs.docker_image_name }}:latest --push .

      - name: Perform release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn --batch-mode release:perform -Dusername=$GITHUB_ACTOR -Dpassword=$GITHUB_TOKEN